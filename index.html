<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Điều Ước Không SMART / The Un-SMART Wish</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;800&family=Be+Vietnam+Pro:wght@400;500;600;800&display=swap" rel="stylesheet">
<style>
:root{
  --sky-1:#FFF8EA; --sky-2:#FFE7BF;
  --sand:#F3D298; --sand-2:#E7BE79; --sand-3:#DFAF62; --sand-line:#C98F44;
  --blue:#3AA9E8; --blue-mid:#2589C4; --blue-deep:#14618F;
  --ink:#231A12; --ink-soft:#6B5747;
  --gold:#F2A81C; --gold-deep:#C77C05;
  --alert:#E24B47; --good:#1E9E62; --paper:#FFFFFF;
  --r:16px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;height:100%}
body{
  font-family:'Be Vietnam Pro',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  color:var(--ink);background:var(--sky-2);
  min-height:100dvh;display:flex;justify-content:center;overscroll-behavior:none;
}
.app{
  width:100%;max-width:470px;background:var(--sky-1);
  min-height:100dvh;display:flex;flex-direction:column;
  position:relative;box-shadow:0 0 40px rgba(35,26,18,.13);
}

/* ---------------- LANGUAGE SPLASH ---------------- */
.splash{
  position:absolute;inset:0;z-index:60;background:var(--sky-1);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:26px 22px;text-align:center;gap:6px;
}
.splash .lamp-mark{width:96px;height:96px;margin-bottom:6px}
.splash h1{font-family:'Baloo 2',cursive;font-size:25px;line-height:1.15;margin:0 0 2px;letter-spacing:.02em}
.splash h2{font-family:'Baloo 2',cursive;font-size:19px;line-height:1.15;margin:0 0 16px;color:var(--blue-deep);font-weight:600}
.splash .pick{font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:12px}
.langbtns{display:flex;flex-direction:column;gap:11px;width:100%;max-width:300px}
.langbtn{
  display:flex;align-items:center;gap:13px;width:100%;padding:13px 16px;
  border:3px solid var(--ink);border-radius:15px;background:var(--paper);
  font-family:'Be Vietnam Pro';font-size:16px;font-weight:700;color:var(--ink);
  cursor:pointer;box-shadow:0 4px 0 var(--ink);
}
.langbtn:active{transform:translateY(2px);box-shadow:0 2px 0 var(--ink)}
.langbtn svg{width:38px;height:26px;border-radius:4px;flex:none;box-shadow:0 0 0 1.5px rgba(35,26,18,.35)}

/* ---------------- HUD ---------------- */
.hud{padding:10px 13px 9px;border-bottom:2px solid rgba(201,143,68,.3);z-index:30}
.hud-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;gap:8px}
.hud-title{font-family:'Baloo 2',cursive;font-size:13.5px;font-weight:800;letter-spacing:.04em;line-height:1.1}
.hud-score{font-size:11.5px;font-weight:600;color:var(--ink-soft);white-space:nowrap}
.hud-right{display:flex;align-items:center;gap:7px;flex:none}
.iconbtn{background:none;border:2px solid rgba(201,143,68,.55);border-radius:9px;height:28px;
  font-size:13px;line-height:1;padding:0 6px;cursor:pointer;display:flex;align-items:center}
.iconbtn.off{opacity:.4}
#langBtn svg{width:22px;height:15px;border-radius:2px;display:block;box-shadow:0 0 0 1px rgba(35,26,18,.3)}
.tiles{display:flex;gap:6px}
.tile{
  flex:1;aspect-ratio:1/1;max-height:46px;border-radius:11px;
  border:2px solid rgba(201,143,68,.45);background:rgba(255,255,255,.6);
  display:flex;align-items:center;justify-content:center;
  font-family:'Baloo 2',cursive;font-weight:800;font-size:18px;
  color:rgba(107,87,71,.42);position:relative;
  transition:transform .25s,background .35s,color .35s,border-color .35s;
}
.tile.on{background:var(--blue);border-color:var(--blue-deep);color:#fff;box-shadow:0 3px 0 var(--blue-deep);transform:translateY(-2px)}
.tile.on::after{content:'✓';position:absolute;top:-6px;right:-4px;background:var(--good);color:#fff;
  font-family:'Be Vietnam Pro';font-size:10px;width:16px;height:16px;border-radius:50%;
  display:grid;place-items:center;border:2px solid var(--sky-1)}
.tile .badge{display:none;position:absolute;bottom:-5px;left:-4px;background:var(--alert);color:#fff;
  font-family:'Be Vietnam Pro';font-size:9px;font-weight:700;padding:1px 5px;border-radius:8px;border:2px solid var(--sky-1)}
.tile.twice .badge{display:block}
.tile.crack{animation:crack .75s ease}
@keyframes crack{
  0%{transform:translateY(-2px)}
  15%{transform:translateY(-2px) rotate(-10deg) scale(1.16);background:var(--alert);border-color:#96302d}
  35%{transform:translateY(-2px) rotate(9deg) scale(1.12);background:var(--alert);border-color:#96302d}
  55%{transform:translateY(-2px) rotate(-6deg) scale(1.07);background:var(--alert)}
  100%{transform:translateY(-2px)}
}

/* ---------------- STAGE ---------------- */
.stage{position:relative;width:100%;aspect-ratio:1/1;max-height:58dvh;overflow:hidden;background:var(--sky-1)}
.stage svg{position:absolute;inset:0;width:100%;height:100%;display:block}
.hidden{display:none!important}

.talk{position:absolute;inset:0;pointer-events:none;z-index:10}
.sb{position:absolute;max-width:66%;padding:10px 13px;border-radius:15px;
  font-size:15px;line-height:1.4;font-weight:600;animation:sbPop .34s cubic-bezier(.3,1.5,.5,1)}
@keyframes sbPop{0%{opacity:0;transform:scale(.7) translateY(8px)}100%{opacity:1;transform:scale(1) translateY(0)}}
.sb .who{display:block;font-size:9.5px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;opacity:.62;margin-bottom:2px}
.sb::after{content:'';position:absolute;width:0;height:0;border:11px solid transparent}
.sb-stick{left:3%;top:4%;background:var(--paper);color:var(--ink);border:3px solid var(--ink);box-shadow:0 3px 0 var(--ink)}
.sb-stick::after{bottom:-22px;left:24px;border-top-color:var(--ink);border-bottom:0}
.sb-genie{right:3%;top:4%;background:var(--blue);color:#fff;border:3px solid var(--blue-deep);box-shadow:0 3px 0 var(--blue-deep)}
.sb-genie::after{bottom:-22px;right:26px;border-top-color:var(--blue-deep);border-bottom:0}
.sb-cop{right:3%;top:30%;background:#33528F;color:#fff;max-width:60%;border:3px solid #1C2E56;box-shadow:0 3px 0 #1C2E56}
.sb-cop::after{bottom:-22px;right:30px;border-top-color:#1C2E56;border-bottom:0}
.sb-narr{left:4%;right:4%;bottom:3%;max-width:none;text-align:center;
  background:rgba(35,26,18,.84);color:#FFF6E5;font-style:italic;font-weight:500;
  font-size:13.5px;padding:9px 12px;border-radius:12px;border:none;box-shadow:none}
.sb-narr::after{display:none}

.dots{position:absolute;top:3%;left:50%;transform:translateX(-50%) scale(.4);
  font-family:'Baloo 2',cursive;font-size:60px;font-weight:800;color:var(--ink);opacity:0;line-height:1;z-index:9}
.dots.show{animation:dotsPop 1.2s ease forwards}
@keyframes dotsPop{0%{opacity:0;transform:translateX(-50%) scale(.4)}
  30%{opacity:1;transform:translateX(-50%) scale(1.14)}
  72%{opacity:1;transform:translateX(-50%) scale(1)}
  100%{opacity:0;transform:translateX(-50%) scale(1)}}
.flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:8}
.flash.go{animation:fl .5s ease}
@keyframes fl{0%{opacity:.9}100%{opacity:0}}

.coin{animation:coinDrop 1.05s cubic-bezier(.4,1.4,.6,1) forwards}
@keyframes coinDrop{0%{transform:translateY(-200px) rotate(0)}70%{transform:translateY(0) rotate(560deg)}84%{transform:translateY(-13px) rotate(585deg)}100%{transform:translateY(0) rotate(578deg)}}
.wind{animation:windGo 1.6s ease forwards}
@keyframes windGo{0%{transform:translateX(-140px);opacity:0}25%{opacity:.95}100%{transform:translateX(460px);opacity:0}}
.pile{transform-origin:118px 358px;animation:pileUp .85s cubic-bezier(.3,1.5,.5,1) forwards}
@keyframes pileUp{0%{transform:scaleY(0)}100%{transform:scaleY(1)}}
.bill{animation:billFall 2.6s linear infinite}
@keyframes billFall{0%{transform:translateY(-70px) rotate(0);opacity:0}14%{opacity:1}100%{transform:translateY(150px) rotate(330deg);opacity:0}}
.hand{transform-origin:200px 200px;animation:tick 2.4s linear infinite}
@keyframes tick{100%{transform:rotate(360deg)}}
.car{animation:carIn 1.15s cubic-bezier(.2,.9,.3,1) forwards}
@keyframes carIn{0%{transform:translateX(280px)}100%{transform:translateX(0)}}
.lightA{animation:blink .5s steps(1) infinite}
.lightB{animation:blink .5s steps(1) infinite;animation-delay:.25s}
@keyframes blink{0%,49%{opacity:1}50%,100%{opacity:.12}}
.pop{animation:popIn .5s cubic-bezier(.3,1.6,.5,1) forwards}
@keyframes popIn{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}
.snapfx{animation:snapGo .65s ease forwards}
@keyframes snapGo{0%{transform:scale(0) rotate(0);opacity:1}100%{transform:scale(2.4) rotate(70deg);opacity:0}}
.shake{animation:sh .42s ease}
@keyframes sh{0%,100%{transform:translateX(0)}22%{transform:translateX(-6px)}66%{transform:translateX(6px)}}
.genie-in{animation:genieIn .85s cubic-bezier(.3,1.4,.5,1) forwards}
@keyframes genieIn{0%{transform:translateY(60px) scale(.25);opacity:0}100%{transform:translateY(0) scale(1);opacity:1}}
.float{animation:fl2 3.6s ease-in-out infinite}
@keyframes fl2{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.floatS{animation:fl3 4s ease-in-out infinite}
@keyframes fl3{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.trudge{animation:tr 1.9s ease-in-out infinite}
@keyframes tr{0%,100%{transform:translateY(0) rotate(-1.5deg)}50%{transform:translateY(-3px) rotate(1.5deg)}}
.qmark{animation:qm 2.1s ease-in-out infinite}
@keyframes qm{0%,100%{transform:translateY(0) rotate(-6deg)}50%{transform:translateY(-7px) rotate(6deg)}}
.smoke{animation:sm 1.4s ease-out forwards}
@keyframes sm{0%{opacity:0;transform:scale(.3) translateY(20px)}40%{opacity:.85}100%{opacity:0;transform:scale(1.8) translateY(-40px)}}
.roadline{animation:road 1.1s linear infinite}
@keyframes road{0%{transform:translateX(60px)}100%{transform:translateX(-120px)}}

/* ---------------- BAR ---------------- */
.bar{padding:11px 15px calc(15px + env(safe-area-inset-bottom));background:var(--sky-1)}
.tap{width:100%;padding:14px;border:none;border-radius:var(--r);background:var(--ink);
  color:#FFF6E5;font-family:'Be Vietnam Pro';font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 3px 0 #100b06}
.tap:active{transform:translateY(2px);box-shadow:0 1px 0 #100b06}
.tap .arrow{display:inline-block;animation:nudge 1.3s ease-in-out infinite}
@keyframes nudge{0%,100%{transform:translateX(0)}50%{transform:translateX(5px)}}

.quiz{animation:sbPop .35s ease}
.q-title{font-family:'Baloo 2',cursive;font-size:17px;font-weight:800;text-align:center;margin:0 0 2px}
.q-sub{font-size:11.5px;text-align:center;color:var(--ink-soft);margin:0 0 10px}
.opts{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.opt{aspect-ratio:1/1;border-radius:13px;border:2px solid var(--ink);background:var(--paper);
  font-family:'Baloo 2',cursive;font-weight:800;font-size:21px;color:var(--ink);cursor:pointer;
  box-shadow:0 3px 0 var(--ink);display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1}
.opt small{font-family:'Be Vietnam Pro';font-size:7px;font-weight:600;opacity:.65;margin-top:2px;padding:0 1px;text-align:center}
.opt:active{transform:translateY(2px);box-shadow:0 1px 0 var(--ink)}
.opt.picked{background:var(--gold);border-color:var(--gold-deep);color:#3a2600;box-shadow:0 3px 0 var(--gold-deep);transform:translateY(-2px)}
.opt.nope{animation:sh .4s ease}
.opt:disabled{cursor:default}
.opt.right{background:var(--good);border-color:#0d6b40;color:#fff;box-shadow:0 3px 0 #0d6b40}
.opt.wrong{background:var(--alert);border-color:#96302d;color:#fff;box-shadow:0 3px 0 #96302d;opacity:.55}
.confirm{margin-top:10px}
.tap:disabled{opacity:.38;cursor:default;box-shadow:0 3px 0 #100b06}
.tap:disabled:active{transform:none;box-shadow:0 3px 0 #100b06}
.tap:disabled .arrow{animation:none}
.retry{background:var(--gold);color:#3a2600;box-shadow:0 3px 0 var(--gold-deep);margin-top:10px}
.retry:active{box-shadow:0 1px 0 var(--gold-deep)}
.fb{margin-top:10px;padding:12px 14px;border-radius:var(--r);font-size:13.5px;line-height:1.5;animation:sbPop .3s ease}
.fb.ok{background:#E4F6ED;border:2px solid var(--good);color:#0d5c39}
.fb.no{background:#FDEBEA;border:2px solid var(--alert);color:#8f2b28}
.fb b{font-weight:800}

/* ---------------- END ---------------- */
.end{padding:20px 15px calc(24px + env(safe-area-inset-bottom));animation:sbPop .4s ease}
.end h2{font-family:'Baloo 2',cursive;font-size:27px;margin:0 0 3px;text-align:center;letter-spacing:.04em}
.end .sc{text-align:center;font-size:14px;color:var(--ink-soft);margin-bottom:15px;font-weight:600}
.smart-row{display:flex;gap:6px;margin-bottom:17px}
.sm{flex:1;background:var(--blue);color:#fff;border-radius:12px;padding:9px 2px;text-align:center;box-shadow:0 3px 0 var(--blue-deep)}
.sm b{font-family:'Baloo 2',cursive;font-size:22px;display:block;line-height:1}
.sm span{font-size:7.5px;font-weight:600;opacity:.93;display:block;line-height:1.2}
.recap{width:100%;border-collapse:collapse;font-size:12.5px;margin-bottom:17px;background:var(--paper);border-radius:12px;overflow:hidden;box-shadow:0 2px 0 rgba(35,26,18,.18)}
.recap th{background:var(--ink);color:#FFF6E5;padding:7px 8px;text-align:left;font-size:10px;letter-spacing:.05em;text-transform:uppercase}
.recap td{padding:7px 8px;border-top:1px solid rgba(35,26,18,.1);vertical-align:top;line-height:1.35}
.recap td.k{font-family:'Baloo 2',cursive;font-weight:800;font-size:16px;text-align:center;width:28px;color:var(--blue-mid)}
.keypoint{background:var(--gold);color:#3a2600;border-radius:var(--r);padding:14px;font-size:14px;line-height:1.5;margin-bottom:17px;box-shadow:0 3px 0 var(--gold-deep);font-weight:600}
.debrief{background:var(--paper);border:2px dashed rgba(201,143,68,.75);border-radius:var(--r);padding:14px;margin-bottom:15px}
.debrief h3{font-family:'Baloo 2',cursive;font-size:15px;margin:0 0 8px}
.debrief ol{margin:0;padding-left:18px;font-size:13.5px;line-height:1.55}
.debrief li{margin-bottom:6px}
.again{width:100%;padding:13px;border:2px solid var(--ink);border-radius:var(--r);background:transparent;
  font-family:'Be Vietnam Pro';font-size:14px;font-weight:700;color:var(--ink);cursor:pointer;box-shadow:0 3px 0 var(--ink)}
.again:active{transform:translateY(2px);box-shadow:0 1px 0 var(--ink)}

@media (prefers-reduced-motion: reduce){*,*::after,*::before{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}}
@media (max-height:700px){.stage{aspect-ratio:6/5;max-height:50dvh}.sb{font-size:14px;padding:8px 11px}.sb-narr{font-size:12.5px}}
:focus-visible{outline:3px solid var(--gold);outline-offset:2px}
</style>
</head>
<body>
<div class="app">

  <!-- LANGUAGE SPLASH -->
  <div class="splash" id="splash">
    <svg class="lamp-mark" viewBox="0 0 120 120" aria-hidden="true">
      <circle cx="60" cy="60" r="56" fill="#FFE7BF"/>
      <path d="M36 78 q-4-27 24-27 q28 0 24 27 z" fill="#F2A81C"/>
      <path d="M36 78 h48 q2 9-8 9 h-32 q-10 0-8-9z" fill="#C77C05"/>
      <path d="M84 60 q20-3 22 8 q1 7-7 7" stroke="#C77C05" stroke-width="6" fill="none" stroke-linecap="round"/>
      <path d="M32 62 q-15-3 -17 5" stroke="#F2A81C" stroke-width="7" fill="none" stroke-linecap="round"/>
      <circle cx="60" cy="47" r="6" fill="#FFF8EA"/>
      <circle cx="76" cy="32" r="9" fill="#BFE6FA" opacity=".8"/>
      <circle cx="90" cy="18" r="6" fill="#BFE6FA" opacity=".6"/>
    </svg>
    <h1>ĐIỀU ƯỚC KHÔNG SMART</h1>
    <h2>The Un-SMART Wish</h2>
    <div class="pick">Chọn ngôn ngữ · Choose language</div>
    <div class="langbtns" id="langbtns"></div>
  </div>

  <div class="hud">
    <div class="hud-top">
      <div class="hud-title" id="hudTitle">ĐIỀU ƯỚC KHÔNG SMART</div>
      <div class="hud-right">
        <div class="hud-score" id="score">0/6</div>
        <button class="iconbtn" id="langBtn" aria-label="Language"></button>
        <button class="iconbtn" id="mute" aria-label="Sound">🔊</button>
      </div>
    </div>
    <div class="tiles">
      <div class="tile" data-k="S">S<span class="badge">×2</span></div>
      <div class="tile" data-k="M">M<span class="badge">×2</span></div>
      <div class="tile" data-k="A">A<span class="badge">×2</span></div>
      <div class="tile" data-k="R">R<span class="badge">×2</span></div>
      <div class="tile" data-k="T">T<span class="badge">×2</span></div>
    </div>
  </div>

  <div class="stage" id="stage">
    <svg viewBox="0 0 400 400" preserveAspectRatio="xMidYMax slice" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">

      <!--  -->
      <!-- SCENE A : DESERT -->
      <!--  -->
      <g id="sceneDesert">
      <rect x="0" y="0" width="400" height="400" fill="#FFF8EA"/>
      <circle cx="342" cy="150" r="30" fill="#FFE3A6"/>
      <circle cx="342" cy="150" r="20" fill="#FFC24D"/>
      <path d="M0 268 Q80 240 152 262 Q232 286 302 258 Q352 238 400 254 L400 400 L0 400Z" fill="#F3D298"/>
      <path d="M0 300 Q92 278 174 296 Q264 316 400 288 L400 400 L0 400Z" fill="#E7BE79"/>
      <path d="M0 340 Q124 322 226 338 Q326 352 400 332 L400 400 L0 400Z" fill="#DFAF62"/>
      <path d="M34 368 Q86 362 138 368" stroke="#C98F44" stroke-width="2.5" fill="none" stroke-linecap="round" opacity=".45"/>
      <path d="M254 388 Q306 382 358 388" stroke="#C98F44" stroke-width="2.5" fill="none" stroke-linecap="round" opacity=".45"/>

      <g id="fxWind" class="hidden" opacity=".9">
        <path d="M0 220 h72" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
        <path d="M24 248 h52" stroke="#fff" stroke-width="3.5" stroke-linecap="round"/>
        <path d="M6 276 h84" stroke="#fff" stroke-width="3.5" stroke-linecap="round"/>
      </g>

      <g id="lamp">
        <ellipse cx="300" cy="360" rx="30" ry="6" fill="#C98F44" opacity=".35"/>
        <path d="M277 354 q-3-19 23-19 q26 0 23 19 z" fill="#F2A81C"/>
        <path d="M277 354 h46 q2 7-7 7 h-32 q-9 0-7-7z" fill="#C77C05"/>
        <path d="M323 340 q19-3 21 7 q1 6-6 6" stroke="#C77C05" stroke-width="4.5" fill="none" stroke-linecap="round"/>
        <path d="M273 342 q-14-3 -16 4" stroke="#F2A81C" stroke-width="6" fill="none" stroke-linecap="round"/>
        <circle cx="300" cy="333" r="4.5" fill="#FFE3A6"/>
      </g>
      <g id="fxSmoke" class="hidden">
        <g class="smoke">
          <circle cx="300" cy="320" r="14" fill="#BFE6FA" opacity=".7"/>
          <circle cx="286" cy="300" r="11" fill="#D8F0FC" opacity=".6"/>
          <circle cx="312" cy="290" r="13" fill="#BFE6FA" opacity=".5"/>
        </g>
      </g>

      <!-- genie (desert) -->
      <g id="genie" class="hidden">
        <g class="float">
          <path d="M300 300 Q312 332 296 350 Q276 370 250 360 Q232 352 240 336" stroke="#3AA9E8" stroke-width="11" fill="none" stroke-linecap="round" opacity=".55"/>
          <path d="M300 292 Q310 322 296 342 Q280 358 258 352" stroke="#3AA9E8" stroke-width="20" fill="none" stroke-linecap="round" opacity=".8"/>
          <path d="M300 282 Q306 306 298 322" stroke="#3AA9E8" stroke-width="30" fill="none" stroke-linecap="round"/>
          <path d="M262 292 Q252 246 300 240 Q348 246 338 292 Q300 306 262 292 Z" fill="#3AA9E8"/>
          <path d="M262 292 Q252 246 300 240 Q348 246 338 292" fill="none" stroke="#2589C4" stroke-width="3" opacity=".55"/>
          <rect x="266" y="278" width="68" height="15" rx="7" fill="#F2A81C"/>
          <rect x="292" y="278" width="16" height="15" rx="4" fill="#C77C05"/>
          <rect x="291" y="232" width="18" height="14" rx="6" fill="#2589C4"/>
          <ellipse cx="300" cy="212" rx="31" ry="28" fill="#3AA9E8"/>
          <path d="M272 202 q28-14 56 0" fill="none" stroke="#2589C4" stroke-width="3" opacity=".5"/>
          <ellipse cx="269" cy="214" rx="6" ry="9" fill="#2589C4"/>
          <ellipse cx="331" cy="214" rx="6" ry="9" fill="#2589C4"/>

    var ctx = null, on = true;
    function ac(){
      try{
        if(!ctx){
          var AC = window.AudioContext || window.webkitAudioContext;
          if(!AC) return null;
          ctx = new AC();
        }
        if(ctx.state === "suspended") ctx.resume();
        return ctx;
      }catch(e){ return null; }
    }
    function tone(freq, at, dur, type, vol, slideTo){
      if(!on) return;
      var c = ac(); if(!c) return;
      var t0 = c.currentTime + at;
      var o = c.createOscillator(), g = c.createGain();
      o.type = type || "sine";
      o.frequency.setValueAtTime(freq, t0);
      if(slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, t0 + dur);
      g.gain.setValueAtTime(0.0001, t0);
      g.gain.exponentialRampToValueAtTime(vol, t0 + 0.012);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
      o.connect(g); g.connect(c.destination);
      o.start(t0); o.stop(t0 + dur + 0.04);
    }
    return {
      unlock: function(){ ac(); },
      toggle: function(){ on = !on; if(on) ac(); return on; },
      click: function(){ tone(640, 0, 0.07, "triangle", 0.09); },

    talk.appendChild(d);
  }

  function tapLabel(){
    var list = beatList();
    if(state.beat < list.length){
      if(state.phase === "intro" && state.beat === list.length - 1) return t().rub;
      return t().next;
    }
    return t().wish;
  }
  function drawTapButton(){
    bar.innerHTML = '<button class="tap" id="next">' + tapLabel() + ' <span class="arrow">›</span></button>';
    el("next").addEventListener("click", function(){ Sound.unlock(); advance(); });
  }

  function showBeat(){
    var b = beatList()[state.beat];
    if(b.scene) setScene(b.scene);
    if(b.pose) setPose(b.pose);
    if(b.gpose) setGPose(b.gpose);
    drawBubble(state.beat);
    if(b.fx) runFx(b.fx);
    state.beat++;
    if(state.beat < beatList().length || state.phase === "intro"){
      drawTapButton();
    } else {
      bar.innerHTML = "";
      setTimeout(showQuiz, 380);
    }
  }

  function advance(){
    if(state.phase === "intro" && state.beat >= STRUCT.intro.length){ startRound(0); return; }
    showBeat();
  }

  function startRound(i){
    state.phase = "round";
    state.view = "story";
    state.round = i;
    state.beat = 0;
    state.locked = false;
    state.solved = false;
    state.pickedKey = null;
    state.wrongKeys = [];
    state.retried = false;
    clearFx();
    setScene(i === 5 ? "car" : "desert");
    setPose(i >= 4 ? "cuff" : "walk");
    setGPose("cross");
    el("score").textContent = t().round(i + 1);
    showBeat();
  }

  /* ================= QUIZ ================= */
  function showQuiz(){
    state.view = "quiz";
    var r = STRUCT.rounds[state.round], tx = t().rounds[state.round];
    var html = '<div class="quiz"><p class="q-title">' + t().qTitle + '</p>' +
               '<p class="q-sub">' + t().qSub + '</p><div class="opts">';
    ["S","M","A","R","T"].forEach(function(k){
      html += '<button class="opt" data-k="' + k + '">' + k +
              '<small>' + t().letters[k] + '</small></button>';
    });
    html += '</div><button class="tap confirm" id="confirmBtn" disabled>' + t().confirm + '</button>' +
            '<div id="fbSlot"></div></div>';
    bar.innerHTML = html;

    // restore any options already ruled out
    state.wrongKeys.forEach(function(k){
      var b = bar.querySelector('.opt[data-k="' + k + '"]');
      if(b){ b.classList.add("wrong"); b.disabled = true; }
    });

    if(state.solved){
      var win = bar.querySelector('.opt[data-k="' + r.answer + '"]');
      if(win) win.classList.add("right");
      bar.querySelectorAll(".opt").forEach(function(b){ b.disabled = true; });
      el("confirmBtn").style.display = "none";
      showOkFeedback(tx);
    } else {
      bar.querySelectorAll(".opt").forEach(function(b){
        b.addEventListener("click", function(){ pick(b); });
      });
      el("confirmBtn").addEventListener("click", function(){ submit(); });
      if(state.pickedKey){
        var p = bar.querySelector('.opt[data-k="' + state.pickedKey + '"]');
        if(p && !p.disabled){ p.classList.add("picked"); el("confirmBtn").disabled = false; }
      }
    }
  }

  function pick(btn){
    if(state.locked || btn.disabled) return;
    Sound.click();
    state.pickedKey = btn.getAttribute("data-k");
    bar.querySelectorAll(".opt").forEach(function(b){ b.classList.remove("picked"); });
    btn.classList.add("picked");
    el("confirmBtn").disabled = false;
    var slot = el("fbSlot");
    if(slot) slot.innerHTML = "";
  }

  function showOkFeedback(tx){
    var slot = el("fbSlot");
    slot.innerHTML = '<div class="fb ok">' + tx.ok + '</div>';
    var last = state.round === STRUCT.rounds.length - 1;
    var go = document.createElement("button");
    go.className = "tap";
    go.style.marginTop = "11px";
    go.innerHTML = (last ? t().summary : t().nextRound) + ' <span class="arrow">›</span>';
    go.addEventListener("click", function(){ last ? showEnd() : startRound(state.round + 1); });
    slot.appendChild(go);
  }

  function submit(){
    if(state.locked || !state.pickedKey) return;
    var r = STRUCT.rounds[state.round], tx = t().rounds[state.round];
    var btn = bar.querySelector('.opt[data-k="' + state.pickedKey + '"]');
    btn.classList.remove("picked");

    if(state.pickedKey === r.answer){
      state.locked = true;
      state.solved = true;
      Sound.correct();
      btn.classList.add("right");
      bar.querySelectorAll(".opt").forEach(function(b){ b.disabled = true; });
      el("confirmBtn").style.display = "none";
      if(!state.retried) state.correct++;
      awardTile(r);
      showOkFeedback(tx);
    } else {
      Sound.wrong();
      restart(btn, "nope");
      btn.classList.add("wrong");
      btn.disabled = true;
      if(state.wrongKeys.indexOf(state.pickedKey) < 0) state.wrongKeys.push(state.pickedKey);
      state.retried = true;
      state.pickedKey = null;
      el("confirmBtn").disabled = true;

      var slot = el("fbSlot");
      slot.innerHTML = '<div class="fb no"><b>' + t().notQuite + '</b> ' + tx.hint + '</div>';
      var again = document.createElement("button");
      again.className = "tap retry";
      again.id = "retryBtn";
      again.textContent = t().retry;
      again.addEventListener("click", function(){
        slot.innerHTML = "";
        el("confirmBtn").disabled = true;
      });
      slot.appendChild(again);
    }
  }

  function awardTile(r){
    var tile = document.querySelector('.tile[data-k="' + r.answer + '"]');
    if(r.reopen && state.earned[r.answer]){
      restart(tile, "crack");
      setTimeout(function(){ tile.classList.add("twice"); }, 520);
    } else {
      tile.classList.add("on");
      state.earned[r.answer] = true;
    }
  }

  /* ================= END SCREEN ================= */
  function showEnd(){
    state.view = "end";
    stage.classList.add("hidden");
    el("score").textContent = t().hudFinal(state.correct);
    var html = '<div class="end"><h2>' + t().endTitle + '</h2>' +
               '<p class="sc">' + t().endScore(state.correct) + '</p><div class="smart-row">';
    ["S","M","A","R","T"].forEach(function(k){
      html += '<div class="sm"><b>' + k + '</b><span>' + t().letters[k] + '</span></div>';
    });
    html += '</div><div class="keypoint">' + t().keypoint + '</div><table class="recap"><tr>';
    t().recapHead.forEach(function(h){ html += '<th>' + h + '</th>'; });
    html += '</tr>';
    t().recap.forEach(function(r){
      html += '<tr><td class="k">' + r[0] + '</td><td>' + r[1] + '</td><td>' + r[2] + '</td></tr>';
    });
    html += '</table><div class="debrief"><h3>' + t().debriefTitle + '</h3><ol>';
    t().debrief.forEach(function(q){ html += '<li>' + q + '</li>'; });
    html += '</ol></div><button class="again" id="restartBtn">' + t().playAgain + '</button></div>';
    bar.innerHTML = html;
    el("restartBtn").addEventListener("click", function(){ location.reload(); });
  }

  /* ================= LANGUAGE ================= */
  function applyLang(){
    document.documentElement.lang = lang;
    el("hudTitle").textContent = t().title;
    el("langBtn").innerHTML = FLAG[lang === "vi" ? "en" : "vi"];
    el("langBtn").setAttribute("title", lang === "vi" ? "Switch to English" : "Chuyển sang Tiếng Việt");

    if(state.view === "end"){ showEnd(); return; }
    if(state.view === "quiz"){ showQuiz(); }
    else {
      el("score").textContent = state.phase === "intro" ? t().round(1) : t().round(state.round + 1);
      drawBubble(Math.max(0, state.beat - 1));
      drawTapButton();
    }
  }

  function buildSplash(){
    var box = el("langbtns");
    box.innerHTML = "";
    ["vi","en"].forEach(function(code){
      var b = document.createElement("button");
      b.className = "langbtn";
      b.innerHTML = FLAG[code] + "<span>" + T[code].lang + "</span>";
      b.addEventListener("click", function(){
        lang = code;
        Sound.unlock();
        el("splash").classList.add("hidden");
        applyLang();
      });
      box.appendChild(b);
    });
  }

  /* ================= BOOT ================= */
  el("mute").addEventListener("click", function(){
    var on = Sound.toggle();
    this.textContent = on ? "🔊" : "🔇";
    this.classList.toggle("off", !on);
  });
  el("langBtn").addEventListener("click", function(){
    lang = (lang === "vi") ? "en" : "vi";
    applyLang();
  });

  buildSplash();
  setScene("desert");
  setPose("walk");
  setGPose("cross");
  el("langBtn").innerHTML = FLAG.en;
  showBeat();
})();
</script>
</body>
</html>
